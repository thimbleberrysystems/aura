# Toggle logging for the aura program.
# - Set to true to enable logging (honors RUST_LOG).
# - Default is false to keep PTY output clean.
logging = false

[mcp]
# Enable the MCP (management control protocol) server.
# When true, aura will start a control server using the configured transport.
mcp_enabled = true
# Transport: "uds" or "tcp". Use "uds" for local Unix socket by default.
mcp_transport = "uds"
# UNIX domain socket path (used when mcp_transport = "uds").
mcp_uds = "/run/user/1000/aura.sock"
# TCP address (used when mcp_transport = "tcp").
mcp_tcp = "127.0.0.1:50051"

