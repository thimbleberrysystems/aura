[package]
name = "aura"
version = "0.1.0"
edition = "2021"

[dependencies]
portable-pty = "0.9"
anyhow = "1.0"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
tokio-signal = "0.2"
termwiz = "0.23"
atty = "0.2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.7"
tonic = { version = "0.8", features = ["transport"] }
prost = "0.11"
tonic-build = "0.8"

[build-dependencies]
tonic-build = "0.8"
